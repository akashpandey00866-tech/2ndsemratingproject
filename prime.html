<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prime Number Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background:  right,blueviolet,greenyellow);
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 320px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px green;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: greenyellow;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: blueviolet;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Prime Number Checker</h2>

        <input type="number" id="num" placeholder="Enter a number">
        <br>

        <button onclick="checkPrime()">Check</button>

        <p id="result"></p>
    </div>

    <script>
        function checkPrime() {
            let n = document.getElementById("num").value;
            n = Number(n);

            if (n === "") {
                document.getElementById("result").innerText = "Please enter a number";
                return;
            }

            if (n <= 1) {
                document.getElementById("result").innerText = n + " is NOT a Prime Number";
                return;
            }

            let isPrime = true;

            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    isPrime = false;
                    break;
                }
            }

            if (isPrime) {
                document.getElementById("result").innerText = n + " is a Prime Number ";
            } else {
                document.getElementById("result").innerText = n + " is NOT a Prime Number ";
            }
        }
    </script>

</body>
</html>
