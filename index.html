<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="left">
            <h2>Student Result System</h2>

            <label>Student Name</label>
            <input type="text" id="name" placeholder="Enter Student Name">

            <label>Maths</label>
            <input type="number" id="m1">

            <label>Physics</label>
            <input type="number" id="m2">

            <label>Chemistry</label>
            <input type="number" id="m3">

            <label>English</label>
            <input type="number" id="m4">

            <label>Computer</label>
            <input type="number" id="m5">

            <button onclick="calculateResult()">
                Calculate Result
            </button>
        </div>

        <div class="right" id="result">
            <h2>Result</h2>
            <p>Result will appear here...</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
